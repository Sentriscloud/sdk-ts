version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      tooling:
        patterns: ["typescript", "@types/*", "tsup", "vitest", "eslint*", "@typescript-eslint/*"]
      runtime:
        patterns: ["viem", "alloy*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
